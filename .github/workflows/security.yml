name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Security Audit
        run: npm run security:check
        continue-on-error: true

      - name: Check for outdated dependencies
        run: npm run security:outdated
        continue-on-error: true

      - name: Generate audit summary
        if: always()
        run: |
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Last checked: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 | tee audit_output.txt || true
          if grep -q "found 0 vulnerabilities" audit_output.txt; then
            echo "✅ No high or critical vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some vulnerabilities were detected. Review the details above." >> $GITHUB_STEP_SUMMARY
          fi
